name: Build AutoClickerPintar Release APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    # BARIS 27 - SEKARANG UDAH AMAN DAN BENER SINTAKNYA
    - name: Decode Keystore
      run: echo -n "${{ secrets.KEYSTORE_FILE }}" | base64 --decode -i > app/release.jks

    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    - name: Build Release APK
      env:
        RELEASE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AutoClickerPintar
        path: app/build/outputs/apk/release/app-release.apk

